name: Alamid Auto Marketing Campaign

on:
  schedule:
    # هذا الأمر يعني: اشتغل كل يوم الساعة 8 صباحاً بتوقيت السعودية
    - cron: '0 5 * * *' 
  workflow_dispatch: # هذا يخليك تقدر تشغله يدوي بأي وقت تبي

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Scraper (الصياد يجمع الإيميلات)
      run: python scraper.py  # تأكد أن اسم ملف الصياد عندك scraper.py

    - name: Run Striker (إرسال الإيميلات للعملاء الجدد)
      env:
        MS_APP_PASS: ${{ secrets.MS_APP_PASS }} # يسحب كلمة السر السرية
      run: python striker.py # تأكد أن اسم ملف الإرسال عندك striker.py

    - name: Save new data (تحديث القائمة)
      run: |
        git config --global user.name "Alamid-Bot"
        git config --global user.email "bot@alamid.com"
        git add emails.txt
        git commit -m "Update emails list with new leads" || echo "No new emails found"
        git push
