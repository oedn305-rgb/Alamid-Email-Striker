name: Run Telegram Bot

on:
  push:
    branches:
      - main  # أو الفرع الذي تستخدمه

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # هذه الخطوة تقوم بسحب الكود من مستودعك

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'  # تثبيت Python 3.x

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot  # تثبيت المكتبات المطلوبة

      - name: Run Telegram bot
        run: python python-telegram-bot.py  # المسار الصحيح للملف
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
