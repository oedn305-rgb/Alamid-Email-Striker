name: Alamid Final Strike 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *' # تشغيل تلقائي 8 صباحاً بتوقيت مكة

jobs:
  run-alamid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install Libs
        run: pip install pyTelegramBotAPI requests

      - name: تشغيل الرادار والمهاجم
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: |
          python scraper.py
          python striker.py

      - name: تشغيل مكتب العميد (البوت)
        env:
          MS_APP_PASS: ${{ secrets.MS_APP_PASS }}
        run: |
          # البحث عن ملف البوت وتشغيله مهما كان اسمه (بشرط يبدأ بـ ALAMID)
          TARGET_FILE=$(ls ALAMID*.py | head -n 1)
          if [ -z "$TARGET_FILE" ]; then
            echo "❌ لم يتم العثور على ملف البوت!"
            exit 1
          else
            python "$TARGET_FILE"
          fi
