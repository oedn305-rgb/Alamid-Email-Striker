name: Alamid Final System 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  alamid_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install pyTelegramBotAPI

      - name: تشغيل الرادار والمهاجم
        env:
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: |
          # تشغيل الرادار أولاً (إذا كان ملف scraper.py موجود)
          if [ -f "scraper.py" ]; then python scraper.py; fi
          # تشغيل المهاجم للإرسال
          python striker.py

      - name: تشغيل مكتب العميد (البوت)
        env:
          MS_APP_PASS: ${{ secrets.MS_APP_PASS }}
        run: |
          # حل مشكلة النجمة - البحث عن الملف وتشغيله
          FILE_TO_RUN=$(ls ALAMID*.py | head -n 1)
          if [ -z "$FILE_TO_RUN" ]; then
            echo "❌ لم يتم العثور على ملف البوت!"
            exit 1
          else
            echo "✅ جاري تشغيل: $FILE_TO_RUN"
            python "$FILE_TO_RUN"
          fi
