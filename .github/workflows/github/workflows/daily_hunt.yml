name: Alamid Complete System
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  alamid_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install Libs
        run: pip install pyTelegramBotAPI

      - name: Run Scraper and Striker
        run: |
          python scraper.py
          python striker.py

      - name: Run Telegram Bot
        env:
          MS_APP_PASS: ${{ secrets.MS_APP_PASS }}
        run: python ALAMID_STRIKE_FORCE.py
