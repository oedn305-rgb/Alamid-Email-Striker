name: Alamid Final Strike 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install Libs
        run: pip install pyTelegramBotAPI

      - name: تشغيل الرادار والمهاجم
        env:
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }} # ربط السيكرت بالكود
        run: |
          python scraper.py
          python striker.py

      - name: تشغيل مكتب العميد (البوت)
        env:
          MS_APP_PASS: ${{ secrets.MS_APP_PASS }}
        run: |
          # يشغل أي ملف يبدأ بـ ALAMID
          python ALAMID*.py
