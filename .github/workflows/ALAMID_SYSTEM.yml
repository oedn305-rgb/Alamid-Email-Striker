name: Send Emails

on:
  workflow_dispatch: # لتشغيل يدويًا
  schedule:
    - cron: '0 9 * * *' # كل يوم الساعة 9 صباحًا

jobs:
  send_emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install requirements
        run: pip install -r requirements.txt
      - name: Run striker.py
        run: python striker.py
        env:
          BOT_EMAIL: ${{ secrets.BOT_EMAIL }}
          BOT_EMAIL_PASS: ${{ secrets.BOT_EMAIL_PASS }}
