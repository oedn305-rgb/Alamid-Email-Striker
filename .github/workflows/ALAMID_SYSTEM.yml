name: Alamid Final Strike 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install Libs
        run: pip install pyTelegramBotAPI

      - name: تشغيل الرادار والمهاجم
        env:
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }} # ربط السيكرت بالكود
        run: |
          python scraper.py
          python striker.py

 - name: تشغيل مكتب العميد (البوت)
        env:
          MS_APP_PASS: ${{ secrets.MS_APP_PASS }}
        run: |
          # البحث عن أي ملف يبدأ بكلمة ALAMID وينتهي بـ .py
          TARGET_FILE=$(ls ALAMID*.py | head -n 1)
          
          if [ -z "$TARGET_FILE" ]; then
            echo "❌ خطأ: لم يتم العثور على أي ملف يبدأ بـ ALAMID ويحمل صيغة .py"
            exit 1
          else
            echo "✅ تم العثور على الملف: $TARGET_FILE"
            python "$TARGET_FILE"
          fi
