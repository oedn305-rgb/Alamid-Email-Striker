name: Alamid Final Strike 2026
# هذا الجزء هو المسؤول عن ظهور زر التشغيل اليدوي
on:
  push:
    branches: [ main ]
  workflow_dispatch: # هذا السطر السحري اللي يطلع لك زر "Run Workflow"

jobs:
  run-alamid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install Libs
        run: pip install pyTelegramBotAPI

      - name: تشغيل المهاجم (الإرسال)
        env:
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python striker.py

      - name: تشغيل البوت (العميد)
        env:
          MS_APP_PASS: ${{ secrets.MS_APP_PASS }}
        run: |
          FILE=$(ls ALAMID*.py | head -n 1)
          python "$FILE"
