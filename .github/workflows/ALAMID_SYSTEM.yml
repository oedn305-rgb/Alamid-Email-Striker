name: ALAMID_FAST_STRIKE
on:
  workflow_dispatch:

jobs:
  strike:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
          cache: 'pip' # سر النجاح: يستخدم الكاش عشان ما يحمل من جديد

      - name: Install Fast
        run: pip install pyTelegramBotAPI requests --quiet

      - name: Launch
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          MS_APP_PASS: ${{ secrets.MS_APP_PASS }}
        run: python ALAMID_STRIKE_FORCE
