name: Send Emails

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'  # كل يوم الساعة 9 صباحًا

jobs:
  send_emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install requirements
        run: pip install -r requirements.txt
      - name: Run striker.py
        run: python striker.py
        env:
          BOT_EMAIL: ${{ secrets.BOT_EMAIL }}
          BOT_EMAIL_PASS: ${{ secrets.BOT_EMAIL_PASS }}
      - name: Run python-telegram-bot
        run: python python-telegram-bot.py  # تأكد من أن الملف موجود في المسار الصحيح
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
