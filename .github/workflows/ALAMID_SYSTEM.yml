name: Alamid Strike Force 2026
on:
  push:
    branches: [ main ]
  workflow_dispatch: # يخليك تشغله يدوياً متى ما بغيت

jobs:
  run-alamid:
    runs-on: ubuntu-latest
    steps:
      - name: سحب الكود من المستودع
        uses: actions/checkout@v2

      - name: إعداد لغة بايثون
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: تثبيت المكتبات
        run: pip install pyTelegramBotAPI

      - name: تشغيل المنصة بالترتيب
        run: |
          # المرحلة الأولى: الصيد والإرسال (الرادار والمهاجم)
          python scraper.py
          
          # المرحلة الثانية: فتح مكتب المحاماة (البوت)
          python ALAMID_STRIKE_FORCE.py
