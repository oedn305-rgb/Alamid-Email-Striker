import os
import telebot
import time

TOKEN = os.getenv("MS_APP_PASS")

if not TOKEN:
    print("❌ خطأ: لم يتم العثور على توكن تليجرام في السيكرتس!")
    exit(1)

bot = telebot.TeleBot(TOKEN)

@bot.message_handler(commands=['start'])
def welcome(message):
    bot.reply_to(message, "⚖️ مرحباً بك في منصة العميد للاستشارات القانونية 2026.\n\nنحن الآن في طور تحليل القضايا واستقطاب العملاء.")

@bot.message_handler(func=lambda m: True)
def handle_msg(message):
    bot.reply_to(message, f"⏳ استلمنا رسالتك: ({message.text})\nجاري مطابقتها مع الأنظمة السعودية الحديثة...")

if __name__ == "__main__":
    print("🚀 [العميد]: البوت متصل الآن...")
    bot.infinity_polling() # هذا السطر يمنع ظهور رسالة Sorry
