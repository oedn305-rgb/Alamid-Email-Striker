name: ALAMID_STRIKE_2026
on:
  workflow_dispatch: # هذا اللي يطلع لك الزر الأزرق

jobs:
  run-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install Libs
        run: pip install pyTelegramBotAPI requests --quiet

      - name: Launch Strike
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          MS_APP_PASS: ${{ secrets.MS_APP_PASS }}
        run: |
          # تشغيل ملف البوت والمهاجم مباشرة
          python ALAMID_STRIKE_FORCE
