name: Send Marketing Emails

on:
  workflow_dispatch: # يخليك تشغله بيدك

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Run Striker
        env:
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }} # 👈 هذا السطر هو اللي يحل مشكلة الـ Secrets
        run: python striker.py
