name: Send Emails and Run Telegram Bot

on:
  workflow_dispatch:  # لتشغيل يدويًا من واجهة GitHub
  schedule:
    - cron: '0 9 * * *'  # كل يوم الساعة 9 صباحًا

jobs:
  send_emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3  # تحميل الكود من المستودع
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'  # تحديد إصدار Python

      - name: Install requirements
        run: |
          pip install -r requirements.txt  # تثبيت المتطلبات من requirements.txt

      - name: Run striker.py
        run: python striker.py  # تشغيل السكربت striker.py
        env:
          BOT_EMAIL: ${{ secrets.BOT_EMAIL }}
          BOT_EMAIL_PASS: ${{ secrets.BOT_EMAIL_PASS }}

      # تأكد من أن ملف python-telegram-bot.py موجود في المسار الصحيح
      - name: Run python-telegram-bot
        run: python python-telegram-bot.py  # تحديد المسار الصحيح للملف
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
